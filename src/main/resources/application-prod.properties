# =============================================
# CONFIGURACAO PRODUCAO (Railway + PostgreSQL)
# =============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Desativa o H2 console em producao
spring.h2.console.enabled=false

# JWT - Sera definido como variavel de ambiente no Railway
app.jwt.secret=${JWT_SECRET:ambulatoFemaSistemaSeguroT16PediatriaMedicina2024SuperSecretKey}
app.jwt.expiration=86400000

# CORS - Dominios permitidos em producao
app.cors.allowed-origins=${CORS_ORIGINS:https://pediatrianm.vercel.app}

# Porta definida pelo Railway
server.port=${PORT:8080}